<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>年度定保工程進度表</title>
    <style>
        body { font-family: sans-serif; padding: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; border: 1px solid #ccc; text-align: center; font-size: 14px; }
        input { padding: 5px; width: 30%; }
        button { cursor: pointer; padding: 4px; margin: 2px; }
    </style>
</head>
<body>
    <h1>年度定保工程進度表</h1>
    
    <div style="margin-bottom: 20px; padding: 10px; border: 1px solid #ccc;">
        <input type="text" id="newGroup" placeholder="組別">
        <input type="text" id="newItem" placeholder="工程項目">
        <button onclick="addNewProject()">新增項目</button>
    </div>

    <table id="projectTable" border="1"></table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgGsFghCmwQ7trASUqsPzxPutEiswsXRI",
            authDomain: "fagg68-f1569.firebaseapp.com",
            databaseURL: "https://fagg68-f1569-default-rtdb.firebaseio.com",
            projectId: "fagg68-f1569",
            storageBucket: "fagg68-f1569.appspot.com",
            messagingSenderId: "207849613044",
            appId: "1:207849613044:web:d0cf853b66b85fb4a660a1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 新增項目
        window.addNewProject = () => {
            const group = document.getElementById('newGroup').value;
            const item = document.getElementById('newItem').value;
            if (!group || !item) { alert("請輸入完整資訊！"); return; }
            push(ref(db, 'projects'), { group, item, status: 'error' });
            document.getElementById('newGroup').value = "";
            document.getElementById('newItem').value = "";
        };

        // 編輯模式
        window.editItem = (id) => {
            const row = document.getElementById(`row-${id}`);
            const itemText = row.querySelector('.item-text').innerText;
            row.querySelector('.item-cell').innerHTML = `<input type="text" id="edit-${id}" value="${itemText}">`;
            row.querySelector('.action-cell').innerHTML = `<button onclick="saveEdit('${id}')">💾儲存</button>`;
        };

        // 儲存修改
        window.saveEdit = (id) => {
            const newItem = document.getElementById(`edit-${id}`).value;
            update(ref(db, 'projects/' + id), { item: newItem });
        };

        // 更新狀態
        window.updateStatus = (id, newStatus) => {
            update(ref(db, 'projects/' + id), { status: newStatus });
        };

        // 刪除項目
        window.deleteProject = (id) => {
            if (confirm("確定要刪除嗎？")) remove(ref(db, 'projects/' + id));
        };

        // 即時渲染表格
        onValue(ref(db, 'projects'), (snapshot) => {
            const data = snapshot.val();
            const table = document.getElementById('projectTable');
            table.innerHTML = `<tr><th>組別</th><th>項目</th><th>狀態</th><th>操作</th></tr>`;
            
            if (data) {
                Object.keys(data).forEach(id => {
                    const p = data[id];
                    // 修正狀態圖示邏輯
                    const statusIcon = (p.status === 'success') ? '✅' : '❌';
                    
                    table.innerHTML += `<tr id="row-${id}">
                        <td>${p.group}</td>
                        <td class="item-cell"><span class="item-text">${p.item}</span></td>
                        <td>${statusIcon}</td>
                        <td class="action-cell">
                            <button onclick="editItem('${id}')">✏️編輯</button>
                            <button onclick="updateStatus('${id}', 'success')">完成</button>
                            <button onclick="updateStatus('${id}', 'error')">待料</button>
                            <button onclick="deleteProject('${id}')" style="color:red;">🗑️</button>
                        </td>
                    </tr>`;
                });
            }
        });
    </script>
</body>
</html>
