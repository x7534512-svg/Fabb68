<body>
    <h1>年度定保工程進度表</h1>
    
    <div style="margin-bottom: 20px; padding: 10px; border: 1px solid #ccc;">
        <input type="text" id="newGroup" placeholder="組別">
        <input type="text" id="newItem" placeholder="工程項目">
        <button onclick="addNewProject()">新增項目</button>
    </div>

    <table id="projectTable" border="1"></table>

    <script type="module">
    // 1. 匯入必要的 Firebase 模組
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // 2. 初始化設定 (請務必填入你 Firebase 控制台 Web SDK 的設定值)
    const firebaseConfig = {
        apiKey: "你的API_KEY",
        authDomain: "fagg68-f1569.firebaseapp.com",
        databaseURL: "https://fagg68-f1569-default-rtdb.firebaseio.com",
        projectId: "fagg68-f1569",
        storageBucket: "fagg68-f1569.appspot.com",
        messagingSenderId: "207849613044",
        appId: "1:207849613044:web:d0cf853b66b85fb4a660a1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 3. 定義新增項目的函數
    window.addNewProject = () => {
        const group = document.getElementById('newGroup').value;
        const item = document.getElementById('newItem').value;
        
        if (!group || !item) {
            alert("請輸入完整資訊！");
            return;
        }

        // 使用 push 產生唯一 ID 並寫入
        const projectsRef = ref(db, 'projects');
        const newProjectRef = push(projectsRef);
        
        set(newProjectRef, {
            group: group,
            item: item,
            status: 'error'
        })
        .then(() => {
            alert("新增成功！");
            document.getElementById('newGroup').value = "";
            document.getElementById('newItem').value = "";
        })
        .catch((error) => {
            console.error("寫入失敗:", error);
            alert("寫入失敗，請檢查 Firebase 規則。");
        });
    };
</script>
</body>
